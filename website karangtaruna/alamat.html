<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alamat Pengiriman</title>
</head>

<body style="background:#f4f4f4;font-family:Arial;max-width:430px;margin:auto;">

<div style="background:#ff5722;color:white;text-align:center;padding:15px;">
    <h2>📍 Alamat Pengiriman</h2>
</div>

<div style="padding:15px;">
<div style="background:white;padding:15px;border-radius:10px;">

    <label>Nama Pembeli</label>
    <input id="nama" type="text" placeholder="Masukkan nama"
        style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ccc;border-radius:8px;">

    <label>Nomor WhatsApp</label>
    <input id="wa" type="tel" placeholder="08xxxxxxxxxx"
        style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ccc;border-radius:8px;">

    <button onclick="getLocation()"
        style="width:100%;padding:10px;margin-bottom:10px;background:#2196f3;color:white;border:none;border-radius:8px;">
        Ambil Lokasi Akurat
    </button>

    <p id="lokasi">Lokasi: Belum diambil</p>

    <hr>

    <p><b>Jumlah Pesanan:</b> <span id="qtyText">1</span></p>
    <p><b>Subtotal:</b> <span id="subtotalText">Rp 15.000</span></p>

    <p id="jarak">Jarak: -</p>
    <p id="ongkir">Ongkir: Menunggu lokasi...</p>

    <h3 id="total">Total: Rp 15.000</h3>

    <a href="pembayaran.html">
        <button style="width:100%;padding:12px;background:#ff5722;color:white;border:none;border-radius:8px;">
            Lanjut ke Pembayaran
        </button>
    </a>

</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

let qty = parseInt(params.get("qty")) || 1;
let subtotal = parseInt(params.get("subtotal")) || 15000;

let ongkir = 0;
let total = subtotal;

// =====================
// KOORDINAT DESA TAMBI (perkiraan pusat)
// =====================
const baseLat = -6.4560;
const baseLon = 108.1050;

// radius maksimal (km)
const MAX_RADIUS = 5;

// tampil awal
document.getElementById("qtyText").innerText = qty;
document.getElementById("subtotalText").innerText =
"Rp " + subtotal.toLocaleString("id-ID");

document.getElementById("total").innerText =
"Total: Rp " + subtotal.toLocaleString("id-ID");

document.getElementById("ongkir").innerText =
"Ongkir: Menunggu lokasi...";

// =====================
// AMBIL LOKASI
// =====================
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
        alert("Browser tidak mendukung GPS");
    }
}

function showPosition(position) {
    let userLat = position.coords.latitude;
    let userLon = position.coords.longitude;

    let distance = getDistance(userLat, userLon, baseLat, baseLon);

    document.getElementById("lokasi").innerHTML =
        "Lokasi: " + userLat + ", " + userLon +
        `<br><a target="_blank" href="https://maps.google.com/?q=${userLat},${userLon}">
        Lihat di Google Maps</a>`;

    document.getElementById("jarak").innerText =
        "Jarak dari Tambi: " + distance.toFixed(2) + " km";

    // ❌ di luar area
    if (distance > MAX_RADIUS) {
        document.getElementById("ongkir").innerText =
            "❌ Maaf, lokasi di luar area pengiriman Tambi";

        document.getElementById("total").innerText =
            "Tidak dapat diproses";

        return;
    }

    // ✔ dalam area
    ongkir = 8000 + Math.round(distance * 1000);
    total = subtotal + ongkir;

    document.getElementById("ongkir").innerText =
        "Ongkir: Rp " + ongkir.toLocaleString("id-ID");

    document.getElementById("total").innerText =
        "Total: Rp " + total.toLocaleString("id-ID");
}

function showError() {
    alert("Gagal mengambil lokasi. Aktifkan GPS / izin lokasi.");
}

// =====================
// HITUNG JARAK (Haversine)
// =====================
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}
</script>

</body>
</html>
