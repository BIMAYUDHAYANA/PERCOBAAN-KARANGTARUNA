<h2>📦 Pengiriman Barang</h2>
<hr><br>

<!-- Pastikan enctype ditambahkan agar file bisa terunggah -->
<form action="proses_barang.html" method="POST" enctype="multipart/form-data">

<div class="form-group">
    <label>Nama Pengirim (wajib sama dengan nama akun)</label>
    <input type="text" name="pengirim" value="<?php echo $_SESSION['username'] ?? ''; ?>" required>
</div>

<div class="form-group">
    <label>Nomor HP Pengirim</label>
    <input type="text" name="hppengirim" required>
</div>

<div class="form-group">
    <label>Alamat Pengirim</label>
    <textarea name="alamat_pengirim" required></textarea>
</div>

<hr><br>

<div class="form-group">
    <label>Nama Penerima</label>
    <input type="text" name="penerima" required>
</div>

<div class="form-group">
    <label>Nomor HP Penerima</label>
    <input type="text" name="hppenerima" required>
</div>

<div class="form-group">
    <label>Alamat Penerima</label>
    <textarea name="alamat_penerima" required></textarea>
</div>

<hr><br>

<div class="form-group">
    <label>Jenis Barang</label>
    <input type="text" name="barang" required>
</div>

<div class="form-group">
    <label>Berat (Kg)</label>
    <input type="number" step="0.1" name="berat" id="berat" min="0.1" required>
</div>

<div class="form-group">
    <label>Estimasi Biaya (Rp 15.000 / Kg)</label>
    <input type="text" id="total_biaya" readonly placeholder="Total biaya muncul di sini" style="background: #eee;">
</div>

<div class="form-group">
    <label>Kendaraan Pengirim</label>
    <select name="kurir">
        <option value="mobil pickup">mobil pickup</option>
        <option value="motor">motor</option>
    </select>
</div>

<div class="form-group">
    <label>Layanan</label>
    <select name="layanan">
        <option value="Reguler">Reguler</option>
        <option value="Express">Express</option>
        <option value="Same Day">Same Day</option>
    </select>
</div>

<div class="form-group">
    <label>Catatan</label>
    <textarea name="catatan"></textarea>
</div>

<!-- Bagian Pembayaran -->
<div class="form-group" style="text-align: center; margin: 20px 0;">
    <label><b>Scan QRIS untuk Pembayaran</b></label><br>
    <img src="qris_anda.jpg" alt="QRIS Pembayaran" style="width: 200px; border: 2px solid #2196F3; border-radius: 10px; margin-top: 10px;">
</div>

<div class="form-group">
    <label>Upload Bukti Pembayaran (Foto)</label>
    <input type="file" name="bukti_bayar" accept="image/*" required>
</div>

<button class="btn-kirim" type="submit">
    📦 Kirim Barang
</button>

</form>

<script>
document.getElementById('berat').oninput = function() {
    var berat = parseFloat(this.value);
    if(!isNaN(berat) && berat > 0) {
        var total = berat * 15000;
        document.getElementById('total_biaya').value = "Rp " + total.toLocaleString('id-ID');
    } else {
        document.getElementById('total_biaya').value = "";
    }
};
</script>
