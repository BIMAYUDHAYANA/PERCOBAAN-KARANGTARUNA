<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang Belanja</title>
</head>

<body style="margin:0;background:#f5f5f5;font-family:Arial,sans-serif;max-width:430px;margin:auto;">

<!-- Header -->
<div style="background:#ff5722;color:white;padding:15px;text-align:center;">
    <h2 style="margin:0;">🛒 Keranjang Belanja</h2>
</div>

<!-- Kembali -->
<div style="padding:10px;">
    <a href="beranda.html">
        <button style="background:#607d8b;color:white;border:none;padding:10px 15px;border-radius:8px;">
            ← Kembali ke Beranda
        </button>
    </a>
</div>

<!-- Card -->
<div style="padding:10px;">
<div style="background:white;padding:15px;border-radius:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">

    <img src="nasi goreng.png"
         style="width:100%;height:180px;object-fit:cover;border-radius:10px;">

    <h3>🍛 Nasi Goreng</h3>
    <p style="color:#666;">Nasi goreng spesial dengan telur dan ayam.</p>

    <h2 style="color:#ff5722;">Rp 15.000</h2>

    <hr>

    <h4>Jumlah Pesanan</h4>

    <div style="display:flex;align-items:center;gap:10px;">
        <button onclick="kurang()" style="width:40px;height:40px;background:#f44336;color:white;border:none;border-radius:8px;">-</button>

        <input id="qty" type="number" value="1" min="1"
            style="width:60px;text-align:center;padding:10px;border:1px solid #ddd;border-radius:8px;">

        <button onclick="tambah()" style="width:40px;height:40px;background:#4caf50;color:white;border:none;border-radius:8px;">+</button>
    </div>

    <hr>

    <h3>Total: <span id="total">Rp 15.000</span></h3>

    <a id="checkoutBtn" href="alamat.html">
        <button style="width:100%;padding:12px;border:none;border-radius:10px;background:#ff5722;color:white;">
            Lanjut Checkout
        </button>
    </a>

</div>
</div>

<script>
let harga = 15000;

function update() {
    let qty = parseInt(document.getElementById("qty").value);
    let total = qty * harga;

    document.getElementById("total").innerText =
        "Rp " + total.toLocaleString("id-ID");

    // kirim data ke alamat
    document.getElementById("checkoutBtn").href =
        "alamat.html?qty=" + qty + "&subtotal=" + total;
}

function tambah(){
    document.getElementById("qty").value++;
    update();
}

function kurang(){
    let q = document.getElementById("qty");
    if(q.value > 1) q.value--;
    update();
}

document.getElementById("qty").addEventListener("input", update);

update();
</script>

</body>
</html>
