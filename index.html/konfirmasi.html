<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Pesanan</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; max-width: 430px; margin: auto; padding-bottom: 30px;">

    <header style="background: #ff5722; color: white; padding: 20px; text-align: center; font-size: 20px; font-weight: bold; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        🎉 Pesanan Berhasil!
    </header>

    <div style="padding: 20px;">

        <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; margin-top: 10px;">
            
            <div style="width: 70px; height: 70px; background: #e8f5e9; color: #4caf50; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; margin: 0 auto 15px auto;">
                ✓
            </div>

            <p style="margin: 0; color: #888; font-size: 14px; font-weight: bold; letter-spacing: 1px;">NOMOR INVOICE</p>
            <h2 id="invoice-num" style="margin: 5px 0 20px 0; color: #333; font-family: 'Courier New', Courier, monospace; background: #f9f9f9; padding: 8px; border-radius: 8px; border: 1px dashed #ddd;">INV-XXXXX</h2>

            <p style="color: #555; font-size: 16px; line-height: 1.5; margin-bottom: 20px;">
                Terima kasih! Pesanan Anda telah berhasil dibuat dan diteruskan ke dapur kami.
            </p>

            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

            <div style="text-align: left; background: #fafafa; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 14px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="color: #777;">Menu:</span>
                    <strong id="ringkasan-menu" style="color: #333;">-</strong>
                </div>
                <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="color: #777;">Metode Bayar:</span>
                    <strong id="ringkasan-metode" style="color: #333; background: #fff3e0; color: #e65100; padding: 2px 8px; border-radius: 4px; font-size: 12px;">-</strong>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: #777;">Total Tagihan:</span>
                    <strong id="ringkasan-total" style="color: #ff5722; font-size: 16px;">-</strong>
                </div>
            </div>

            <div id="status-container" style="background: #fff3e0; border: 1px solid #ffe0b2; padding: 15px; border-radius: 12px; text-align: left; margin-bottom: 25px;">
                <span id="status-title" style="color: #e65100; font-size: 12px; font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;">Status Pesanan:</span>
                <strong id="status-text" style="color: #e65100; font-size: 15px; display: flex; align-items: center; gap: 8px;">
                    ⏳ Menunggu Konfirmasi Restoran
                </strong>
                <p id="status-desc" style="margin: 5px 0 0 0; font-size: 12px; color: #666;">Mohon tunggu sebentar, admin sedang memeriksa pesanan Anda.</p>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button type="button" onclick="lacakPesanan()" style="width: 100%; padding: 14px; background: #ff5722; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(255,87,34,0.2);">
                    📍 Lacak Pesanan via WhatsApp
                </button>
                
                <a href="index.html" style="text-decoration: none;">
                    <button type="button" style="width: 100%; padding: 12px; background: #607d8b; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer;">
                        Kembali ke Beranda
                    </button>
                </a>
            </div>

        </div>

    </div>

<script>
    function updateHalamanKonfirmasi() {
        let dataLokal = localStorage.getItem("pesananMasukAdmin");
        
        if (dataLokal) {
            let pesanan = JSON.parse(dataLokal);
            
            document.getElementById("invoice-num").innerText = pesanan.invoice || "INV-001";
            document.getElementById("ringkasan-menu").innerText = pesanan.produk;
            document.getElementById("ringkasan-metode").innerText = pesanan.metodeBayar;
            document.getElementById("ringkasan-total").innerText = pesanan.totalHarga;

            let container = document.getElementById("status-container");
            let textElement = document.getElementById("status-text");
            let descElement = document.getElementById("status-desc");
            let titleElement = document.getElementById("status-title");

            if (pesanan.status === "DITERIMA") {
                // Status Memasak
                container.style.background = "#e8f5e9";
                container.style.borderColor = "#c8e6c9";
                titleElement.style.color = "#2e7d32";
                textElement.style.color = "#2e7d32";
                textElement.innerHTML = "🍳 Pesanan Sedang Dimasak";
                descElement.innerHTML = "Dapur restoran telah menerima pesananmu dan sedang memproses makanan.";
                descElement.style.color = "#4caf50";
            } 
            else if (pesanan.status === "DIANTAR") {
                // Status BARU: Masakan Jadi & Sedang Diantar
                container.style.background = "#e3f2fd"; // Background biru muda
                container.style.borderColor = "#bbdefb";
                titleElement.style.color = "#0d47a1";
                textElement.style.color = "#0d47a1";
                textElement.innerHTML = "🚚 Makanan Sedang Diantar";
                descElement.innerHTML = "Masakan sudah jadi! Kurir kami sedang dalam perjalanan menuju alamat pengirimanmu.";
                descElement.style.color = "#1e88e5";
            } 
            else if (pesanan.status === "DITOLAK") {
                // Status Ditolak
                container.style.background = "#ffebee";
                container.style.borderColor = "#ffcdd2";
                titleElement.style.color = "#c62828";
                textElement.style.color = "#c62828";
                textElement.innerHTML = "❌ Pesanan Ditolak";
                descElement.innerHTML = "Maaf, pesanan dibatalkan oleh restoran. Hubungi admin untuk info kelanjutan.";
                descElement.style.color = "#f44336";
            } 
            else {
                // Status Antrean Baru (Pending)
                container.style.background = "#fff3e0";
                container.style.borderColor = "#ffe0b2";
                titleElement.style.color = "#e65100";
                textElement.style.color = "#e65100";
                textElement.innerHTML = "⏳ Menunggu Konfirmasi Restoran";
                descElement.innerHTML = "Mohon tunggu sebentar, admin sedang memeriksa pesanan Anda.";
                descElement.style.color = "#666";
            }
        }
    }

    function lacakPesanan() {
        let invoice = document.getElementById("invoice-num").innerText;
        let menu = document.getElementById("ringkasan-menu").innerText;
        let total = document.getElementById("ringkasan-total").innerText;
        let metode = document.getElementById("ringkasan-metode").innerText;

        let nomorWA = "6281234567890"; 
        let teksPesan = `Halo Admin Kuliner, saya ingin menanyakan status pesanan saya:\n\n*No Invoice:* ${invoice}\n*Pesanan:* ${menu}\n*Metode:* ${metode}\n*Total:* ${total}\n\nMohon segera dikonfirmasi ya, terima kasih!`;
        
        window.open(`https://api.whatsapp.com/send?phone=${nomorWA}&text=${encodeURIComponent(teksPesan)}`, '_blank');
    }

    updateHalamanKonfirmasi();
    setInterval(updateHalamanKonfirmasi, 3000); // Sinkronisasi otomatis tiap 3 detik
</script>
</body>
</html>
