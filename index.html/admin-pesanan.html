<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Cek Bukti Pembayaran</title>
</head>
<body style="font-family:Arial,sans-serif;background:#eceff1;max-width:430px;margin:auto;padding-bottom:30px;">

<div style="background:#263238;color:white;padding:20px;text-align:center;">
    <h2 style="margin:0;">⚙️ Dashboard Admin</h2>
    <p style="margin:5px 0 0 0;font-size:12px;opacity:0.8;">Verifikasi Pembayaran Masuk</p>
</div>

<div style="padding:15px;">
    <h3 style="color:#263238;">📥 Pesanan Masuk Terbaru</h3>
    <div id="boxAdmin">
        <div style="background:white;padding:20px;border-radius:12px;text-align:center;color:#999;">
            Belum ada data transaksi masuk.
        </div>
    </div>
</div>

<script>
    function loadPesanan() {
        let databaseLokal = localStorage.getItem("pesananMasukAdmin");
        let container = document.getElementById("boxAdmin");

        if (databaseLokal) {
            let pesanan = JSON.parse(databaseLokal);
            let templateBukti = "";

            if (pesanan.metodeBayar === "QRIS") {
                templateBukti = `
                    <div style="margin-top:15px;background:#f5f5f5;padding:12px;border-radius:8px;border:1px solid #ddd;text-align:center;">
                        <strong style="display:block;margin-bottom:8px;text-align:left;color:#333;">📸 Foto Bukti Transfer Pelanggan:</strong>
                        <a href="${pesanan.buktiGambar}" target="_blank">
                            <img src="${pesanan.buktiGambar}" style="width:100%;max-height:350px;object-fit:contain;background:#fff;border:1px solid #eee;border-radius:6px;">
                        </a>
                        <small style="color:#666;display:block;margin-top:5px;">💡 Klik gambar untuk melihat ukuran penuh</small>
                    </div>
                `;
            } else {
                templateBukti = `
                    <div style="margin-top:15px;background:#e8f5e9;color:#2e7d32;padding:12px;border-radius:8px;font-weight:bold;text-align:center;">
                        💵 Pembayaran menggunakan COD (Bayar Cash ke Kurir)
                    </div>
                `;
            }

            let statusBadge = pesanan.status || "PENDING";
            
            // Menentukan warna badge status di sisi admin
            let badgeColor = "#ff9800"; // Orange untuk Pending
            if (statusBadge === "DITERIMA") badgeColor = "#4caf50"; // Hijau
            if (statusBadge === "DIANTAR") badgeColor = "#2196f3"; // Biru
            if (statusBadge === "DITOLAK") badgeColor = "#f44336"; // Merah

            container.innerHTML = `
                <div style="background:white;padding:20px;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.08);border-top:4px solid ${badgeColor};">
                    <div style="display:flex;justify-content:space-between;font-size:12px;color:#777;margin-bottom:10px;">
                        <span>⏰ ${pesanan.waktu}</span>
                        <div>
                            <strong style="color:${pesanan.metodeBayar === 'QRIS' ? 'green' : 'orange'}">[${pesanan.metodeBayar}]</strong>
                            <span style="background:${badgeColor}; color:white; padding:2px 8px; border-radius:4px; font-weight:bold; margin-left:5px;">${statusBadge}</span>
                        </div>
                    </div>
                    <h4 style="margin:0;color:#777;font-family:monospace;">ID: ${pesanan.invoice || 'INV-001'}</h4>
                    <h3 style="margin:5px 0;">Item: ${pesanan.produk}</h3>
                    <h2 style="margin:5px 0 15px 0;color:#ff5722;">Total Tagihan: ${pesanan.totalHarga}</h2>
                    <hr style="border:0;border-top:1px dashed #eee;">
                    
                    ${templateBukti}

                    <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
                        <div style="display:flex; gap:10px;">
                            <button onclick="prosesOrder('DITERIMA')" style="flex:1; padding:12px; background:#4caf50; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🍳 1. Terima & Masak</button>
                            <button onclick="prosesOrder('DIANTAR')" style="flex:1; padding:12px; background:#ffb300; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🚚 2. Kirim/Antar</button>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="prosesOrder('DITOLAK')" style="flex:1; padding:12px; background:#f44336; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">✕ Tolak Pesanan</button>
                            <button onclick="hapusAntrean()" style="padding:12px; background:#607d8b; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🗑️ Selesai/Hapus</button>
                        </div>
                    </div>
                </div>
            `;
        }
    }

    function prosesOrder(statusBaru) {
        let databaseLokal = localStorage.getItem("pesananMasukAdmin");
        if (databaseLokal) {
            let pesanan = JSON.parse(databaseLokal);
            pesanan.status = statusBaru; 
            localStorage.setItem("pesananMasukAdmin", JSON.stringify(pesanan)); 
            alert("Status pesanan diperbarui: " + statusBaru);
            location.reload();
        }
    }

    function hapusAntrean() {
        if(confirm("Hapus transaksi ini dari list dashboard admin?")) {
            localStorage.removeItem("pesananMasukAdmin");
            location.reload();
        }
    }

    loadPesanan();
</script>
</body>
</html>
